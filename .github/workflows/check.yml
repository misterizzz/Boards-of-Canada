name: BoC album watcher

on:
  schedule:
    # GitHub Actions minimum interval is 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Send a test ntfy push regardless of state diff"
        required: false
        default: "false"
  push:
    branches:
      - main
      - claude/ios-album-notifications-akAwd
    paths:
      - "scraper.py"
      - "requirements.txt"
      - ".github/workflows/check.yml"

permissions:
  contents: write

concurrency:
  group: boc-watcher
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install --retries 5 --timeout 30 -r requirements.txt

      - name: Check for new releases
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          extra_args=""
          if [ "${{ github.event.inputs.force_notify }}" = "true" ]; then
            extra_args="--force-notify"
          fi
          python scraper.py $extra_args

      - name: Commit updated state and PWA data
        run: |
          paths="state.json docs/events.json docs/subscriptions.json docs/icons/icon-192.png docs/icons/icon-512.png docs/icons/.source"
          if [[ -n "$(git status --porcelain -- $paths 2>/dev/null)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $paths 2>/dev/null || true
            git commit -m "chore: update release state and PWA data"
            # Push to main (where cron fires from).
            git push origin HEAD:refs/heads/main
            # Also push to the feature branch (which GitHub Pages serves
            # the PWA from). Fetch the ref first so --force-with-lease has
            # an expected value — without this, the Actions shallow checkout
            # doesn't know the feature branch tip and refuses the push.
            git fetch origin refs/heads/claude/ios-album-notifications-akAwd:refs/remotes/origin/claude/ios-album-notifications-akAwd 2>/dev/null || true
            git push origin HEAD:refs/heads/claude/ios-album-notifications-akAwd --force-with-lease || \
              echo "feature branch push rejected; will retry next run"
          else
            echo "No changes to commit."
          fi
