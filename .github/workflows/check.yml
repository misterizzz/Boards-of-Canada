name: BoC album watcher

on:
  schedule:
    # GitHub Actions minimum interval is 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Send a test ntfy push regardless of state diff"
        required: false
        default: "false"
  push:
    branches:
      - main
      - claude/ios-album-notifications-akAwd
    paths:
      - "scraper.py"
      - "requirements.txt"
      - ".github/workflows/check.yml"

permissions:
  contents: write

concurrency:
  group: boc-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Bootstrap PWA logo (one-off)
        # The repo ships with a 68-byte 1x1 placeholder PNG in docs/icons.
        # On first run we replace it with the Deezer CDN BoC artist photo.
        # Subsequent runs see the real file (>>68 bytes) and skip.
        run: |
          set -euo pipefail
          for size in 192 512; do
            target="docs/icons/icon-${size}.png"
            bytes=$(wc -c < "$target" 2>/dev/null || echo 0)
            if [ "$bytes" -lt 1000 ]; then
              echo "Fetching BoC artist photo for $target"
              curl -fsSL \
                -H "User-Agent: Mozilla/5.0 BoC-Watcher" \
                "https://cdn-images.dzcdn.net/images/artist/e3c41c3df07bec6af0153c8f640b7b62/500x500.jpg" \
                -o /tmp/boc.jpg
              # Convert JPG → PNG via Pillow (already pulled in as a
              # pywebpush transitive dep is unlikely; install explicitly).
              pip install --quiet Pillow
              python3 -c "
from PIL import Image
img = Image.open('/tmp/boc.jpg').convert('RGB')
img = img.resize(($size, $size), Image.LANCZOS)
img.save('$target', 'PNG', optimize=True)
print('wrote $target')
"
            fi
          done

      - name: Check for new releases
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          extra_args=""
          if [ "${{ github.event.inputs.force_notify }}" = "true" ]; then
            extra_args="--force-notify"
          fi
          python scraper.py $extra_args

      - name: Commit updated state and PWA data
        run: |
          if [[ -n "$(git status --porcelain state.json docs/events.json docs/subscriptions.json docs/icons/icon-192.png docs/icons/icon-512.png)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json docs/events.json docs/subscriptions.json docs/icons/icon-192.png docs/icons/icon-512.png
            git commit -m "chore: update release state and PWA data"
            git push
          else
            echo "No changes to commit."
          fi
